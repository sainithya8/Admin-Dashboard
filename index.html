    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🦚 Temple Admin</h2>

            <li onclick="loadDashboard()">Dashboard</li>
            <li onclick="loadUsers()">Devotees</li>
            <li onclick="loadOrders()">Donations</li>

    <div class="main">

        <div class="header">

        </div>

        <div class="banner">
            <h2>Radha Krishna Temple Dashboard</h2>
            <p>Manage devotees, donations & temple services</p>

        <!-- Dynamic Content -->
        <div id="contentArea"></div>

    </div>

<script src="dashboard.js"></script>
</body>
</html>
